name: Deploy web interface

on:
  # Runs only when web_interface/ or this workflow changes — not on every push to main.
  push:
    branches: [main]
    paths:
      - "web_interface/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web_interface/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web_interface

      - name: Build
        run: npm run build
        working-directory: web_interface

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web_interface/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
